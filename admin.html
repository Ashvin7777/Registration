<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Personal Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <a href="data_form.html" class="return-link-fixed">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span>Back to Data Form</span>
    </a>

    <div class="background-elements">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Login Section -->
    <div id="loginFormContainer" class="form-container">
        <div class="form-header">
            <h1>Admin Login</h1>
            <p>Access the secure management portal</p>
        </div>
        <form id="adminLoginForm">
            <div id="errorMessage" class="error-msg"></div>
            <div class="input-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter username" required>
                    <div class="focus-border"></div>
                </div>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter password" required>
                    <div class="focus-border"></div>
                </div>
            </div>
            <button type="submit" class="submit-btn">Login to Dashboard</button>
        </form>
    </div>

    <!-- Dashboard Section (Hidden by Default) -->
    <div id="dashboardContainer" class="dashboard-container hidden">
        <div class="dashboard-header">
            <div>
                <h2>Admin Dashboard</h2>
                <p>Manage and export form submissions</p>
            </div>
            <div class="header-actions">
                <button onclick="exportFormDataToExcel()" class="primary-btn">
                    <span>Export to Excel</span>
                </button>
                <button id="logoutBtn" class="secondary-btn">Logout</button>
            </div>
        </div>

        <div class="table-card">
            <div class="dashboard-controls">
                <div class="search-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Search by name or phone...">
                </div>
                <div class="filter-box">
                    <select id="genderFilter">
                        <option value="all">All Genders</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Full Name</th>
                        <th>Father's Name</th>
                        <th>Age</th>
                        <th>DOB</th>
                        <th>Gender</th>
                        <th>Phone</th>
                        <th>Submitted At</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
