<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="data_form.css">
</head>
<body>
    <a href="admin.html" class="admin-link-fixed">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>Admin Portal Login</span>
    </a>

    <div class="background-elements">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Toast Messages -->
    <div id="successMessage" class="toast success hidden">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>Form Submitted Successfully!</span>
    </div>
    
    <div id="duplicateMessage" class="toast error hidden">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span>Duplicate Entry! Phone number already exists.</span>
    </div>

    <div class="form-container">
        <div class="form-header">
            <h1>Personal Details</h1>
            <p>Please fill out the information below</p>
        </div>
        
        <form id="dataEntryForm">
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                    <div class="focus-border"></div>
                </div>
            </div>

            <div class="input-group">
                <label for="fatherName">Father's Name</label>
                <div class="input-wrapper">
                    <input type="text" id="fatherName" name="fatherName" placeholder="Enter father's name" required>
                    <div class="focus-border"></div>
                </div>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" name="phone" placeholder="10-digit phone number" pattern="\d{10}" minlength="10" maxlength="10" required>
                    <div class="focus-border"></div>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="dob">Date of Birth</label>
                    <div class="input-wrapper">
                        <input type="date" id="dob" name="dob" required>
                        <div class="focus-border"></div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="age">Age</label>
                    <div class="input-wrapper">
                        <input type="number" id="age" name="age" placeholder="Auto-calculated" readonly>
                        <div class="focus-border"></div>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="gender">Gender</label>
                <div class="input-wrapper select-wrapper">
                    <select id="gender" name="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                    <svg class="select-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    <div class="focus-border"></div>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <span>Submit Details</span>
            </button>
        </form>
    </div>

    <script src="data_form.js"></script>
</body>
</html>
